global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']

  - job_name: 'product-service'
    static_configs:
      - targets: ['product-service:3101']

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:3103']

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:3102']
